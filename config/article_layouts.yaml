default_layout: clean_reading

content_type_map:
  tool_review: product_review
  tutorial: practical_tutorial
  technical_walkthrough: practical_tutorial
  news_analysis: news_feature
  industry_analysis: editorial_analysis

layouts:
  clean_reading:
    label: "Clean Reading"
    description: "Soft UI reading layout with stronger hierarchy for daily briefings and general explainers."
    show_title_in_body: false
    use_lede: true
    max_width: "760px"
    page_background: "linear-gradient(180deg, #f5f8fc 0%, #eef4fb 100%)"
    card_background: "#ffffff"
    border_color: "#d8e3f0"
    text_color: "#1e293b"
    muted_color: "#61758a"
    accent_color: "#2b6cb0"
    heading_color: "#17324d"
    code_background: "#0f172a"
    code_color: "#e2e8f0"
    quote_background: "#f1f7ff"
    quote_border: "#6ea8fe"
    table_header_background: "#eff6ff"
    table_row_background_odd: "#ffffff"
    table_row_background_even: "#f8fbff"
    font_family: "'Segoe UI Variable Text','Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"
    heading_font_family: "'Segoe UI Variable Display','Segoe UI','PingFang SC','Microsoft YaHei',sans-serif"
    page_padding: "36px 18px 46px"
    card_padding: "40px 36px 42px"
    card_radius: "30px"
    card_shadow: "0 24px 60px rgba(15,23,42,0.08)"
    lede_size: "20px"
    paragraph_size: "16px"
