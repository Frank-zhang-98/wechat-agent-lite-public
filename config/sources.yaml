github:
  enabled: true
  intent: recommend_and_stack_analysis
  weight: 0.9
  languages:
  - python
  - typescript
  - go
  - rust
  min_stars: 30
  max_results_per_query: 8
  max_results: 24
  query_groups:
  - name: agents-python
    q: language:python agent llm
    max_results: 8
  - name: agents-typescript
    q: language:typescript agent llm
    max_results: 8
  - name: mcp-tooling
    q: mcp llm
    min_stars: 20
    max_results: 8
  - name: rag-evals
    q: rag eval llm
    min_stars: 20
    max_results: 8
  - name: inference-serving
    q: inference serving llm
    min_stars: 20
    max_results: 8
  - name: multimodal-systems
    q: multimodal llm
    min_stars: 20
    max_results: 8

max_age_hours: 168
max_hotspots_per_source: 10
