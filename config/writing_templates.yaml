audiences:
  ai_product_manager:
    label: "AI 产品经理"
    description: "关注产品机制、应用场景、用户价值和落地门槛的从业者。"
    focus:
      - "产品到底解决什么问题"
      - "核心能力和差异化在哪"
      - "能否复制到自己的业务场景"
    tone: "专业、务实、少空话"

  ai_builder:
    label: "AI 应用开发者"
    description: "关注工作流、能力边界、集成方式和工程细节的开发者。"
    focus:
      - "底层能力或工作流机制"
      - "适合什么技术栈和集成方式"
      - "现阶段的限制与风险"
    tone: "技术导向、解释清楚、不装腔作势"

  content_operator:
    label: "内容运营 / 自媒体作者"
    description: "关注选题价值、生产效率、复制路径和商业化机会的内容从业者。"
    focus:
      - "这件事为什么值得写"
      - "它怎样提升内容生产效率"
      - "能不能形成具体工作流"
    tone: "直接、实战、强调可复制性"

pool_profiles:
  news:
    label: "AI 新闻热点"
    strategy: "news_impact"
    objective: "先讲清事件脉络和关键变化，再判断它为什么重要、影响会落到哪里，以及后面该盯哪些信号。"
    opening_rules:
      - "开头先交代事件脉络，再直接指出最值得关注的变化，不要把新闻稿写成背景长铺垫。"
      - "第一屏必须形成判断句，告诉读者这件事为什么值得看。"
    organization_rules:
      - "正文优先按 事件脉络 -> 关键变化 -> 影响判断 -> 后续观察 的顺序展开。"
      - "不要把新闻写成教程，也不要为了显得深入去虚构系统实现细节。"
    evidence_rules:
      - "优先引用发布时间、版本变化、能力变化、价格变化、可用性变化和官方表述。"
      - "如果公开信息不足，就明确写出边界，不要脑补实现链路。"
    ending_rules:
      - "结尾优先给出短期判断和读者接下来要盯的验证点。"
      - "建议聚焦观察点、应对动作和后续验证方向。"
    title_style:
      - "标题优先突出事件、变化和影响。"
      - "避免写成口语问句、教程标题或技术拆解腔。"
    must_cover:
      - "事件脉络"
      - "变化焦点"
      - "影响判断"
      - "后续观察"
    must_avoid:
      - "把新闻写成教程"
      - "无依据脑补技术实现"
      - "只复述材料，不形成判断"
    quality_focus:
      - "是否讲清事件、变化和影响"
      - "是否保持克制，不把未知内容写成已知事实"
    rewrite_focus:
      - "减少新闻复述堆砌，补足变化判断和行动建议"
      - "删除没有依据的技术细节脑补"
    outline_sections:
      - heading: "事件脉络"
        purpose: "先用最短篇幅交代事件、主角和变化点。"
      - heading: "变化焦点"
        purpose: "提炼最值得关注的 2 到 4 个变化，不要平铺原文。"
      - heading: "影响判断"
        purpose: "明确对开发者、产品团队或行业观察者的具体影响。"
      - heading: "后续观察"
        purpose: "给出后续验证点、应对动作或观察建议。"

  github:
    label: "GitHub 热门项目"
    strategy: "project_recommend_plus_stack"
    objective: "先用一句话说清项目本质，再让读者判断它是否适合自己的场景，随后回答为什么在同类方案里值得选它，并按技术栈、实现链路、部署方式、适用边界和仓库链接完成拆解。"
    opening_rules:
      - "开头先用一句话说明它本质上是什么，再立即交代它适合谁、典型使用场景是什么。"
      - "在进入技术细节前，要先回答为什么它在同类项目里值得关注，不要一上来堆技术名词。"
    organization_rules:
      - "正文按 一句话定位 -> 使用场景与目标读者 -> 为什么是它：创新点与同类差异 -> 技术栈分层总览 -> 核心实现拆解 -> 部署方式与接入建议 -> 适用边界与采用建议 -> 总结 -> GitHub 项目链接 的顺序展开。"
      - "核心实现拆解只挑 2 到 4 条最关键链路深拆，每条都要结合代码块或命令块，不要平均铺开所有模块。"
    evidence_rules:
      - "优先引用 README、目录结构、依赖文件、代码片段、工作流配置、部署文档和 release 信号。"
      - "联网补充只用于使用场景、背景对比和同类方案差异，必须与当前仓库强相关，不能混入无关热点。"
    ending_rules:
      - "在结尾前先收束适用边界、部署门槛和采用建议，不要把总结写成空泛吹捧。"
      - "最后单独附上 GitHub 项目链接，便于读者直接查看仓库。"
    title_style:
      - "标题默认是 项目解析 / 技术栈拆解 / 工程观察，不要写成纯推荐标题。"
      - "可以突出热门项目身份，但必须保留专业感。"
    must_cover:
      - "一句话定位"
      - "使用场景与目标读者"
      - "为什么是它：创新点与同类差异"
      - "技术栈分层总览"
      - "核心实现拆解与代码块"
      - "部署方式"
      - "适用边界与采用建议"
      - "总结"
      - "GitHub 项目链接"
    must_avoid:
      - "只介绍项目用途，不分析技术栈"
      - "纯 README 转述"
      - "把推荐文写成空泛安利"
      - "混入与当前仓库无关的联网背景"
    quality_focus:
      - "是否先用一句话定位和使用场景建立读者判断，再进入技术拆解"
      - "是否写出部署方式、代码块和仓库链接"
    rewrite_focus:
      - "补足一句话定位、场景判断、同类差异、部署方式和仓库链接"
      - "减少泛推荐口吻，增强链路拆解、代码解释和适用边界"
    outline_sections:
      - heading: "一句话定位"
        purpose: "先用一到两句话说清这个项目本质上是什么，以及它解决的是哪类问题。"
      - heading: "使用场景与目标读者"
        purpose: "先让读者判断这个项目适不适合自己的场景和团队。"
      - heading: "为什么是它：创新点与同类差异"
        purpose: "解释它相对同类项目的突破点、差异化、代价和优先级。"
      - heading: "技术栈分层总览"
        purpose: "按语言、框架、依赖、服务、集成和部署层次梳理项目技术栈。"
      - heading: "核心实现拆解"
        purpose: "挑 2 到 4 条关键执行链路展开，并结合多个代码块解释关键实现。"
      - heading: "部署方式与接入建议"
        purpose: "整理安装、运行、部署、自托管或接入方式，给出落地门槛。"
      - heading: "适用边界与采用建议"
        purpose: "说明哪些团队适合采用、可能的门槛和不适合的使用边界。"
      - heading: "总结"
        purpose: "用最短篇幅收束判断，回到是否值得尝试和下一步建议。"
      - heading: "GitHub 项目链接"
        purpose: "在结尾单独附上仓库链接，方便读者直接进入项目。"

  deep_dive:
    label: "新技术 / 新方法讲解"
    strategy: "mechanism_first_walkthrough"
    objective: "先交代它在解决什么技术问题，再围绕核心机制、实现链路和工程边界展开。"
    opening_rules:
      - "开头先把技术问题和方法目标讲清楚，不要写成泛泛而谈的趋势导语。"
      - "第一屏要告诉读者为什么这套方法值得理解，而不是先给结论口号。"
    organization_rules:
      - "正文优先按 问题定义 -> 核心机制 -> 实现链路 -> 关键模块/代码 -> 工程边界 的顺序展开。"
      - "如果原文已经有清晰链路，尽量沿用原文顺序，不要强行改写成另一套模板。"
    evidence_rules:
      - "优先引用机制说明、模块职责、代码片段、接口、实验结果和实现步骤。"
      - "每一节都要回答这一层做什么、依赖什么、代价是什么。"
    ending_rules:
      - "结尾优先收束到工程代价、适用边界和采用建议。"
      - "如果信息有缺口，要明确写出未知点，而不是脑补。"
    title_style:
      - "标题更偏 技术实现拆解 / 方法解析 / 架构观察。"
      - "避免写成新闻快评或纯产品介绍。"
    must_cover:
      - "它在解决什么技术问题"
      - "核心机制"
      - "按链路拆实现"
      - "关键代码或模块职责"
      - "工程边界与采用建议"
    must_avoid:
      - "把深度文章写成新闻快评"
      - "只讲结论，不讲链路"
      - "把技术长文写成产品介绍"
    quality_focus:
      - "是否讲清机制、链路和代码职责"
      - "是否保留工程边界，不把推测写成事实"
    rewrite_focus:
      - "补足机制解释、链路顺序和模块职责"
      - "减少概括式大话，增强实现层细节"
    outline_sections:
      - heading: "它在解决什么技术问题"
        purpose: "用一节把目标问题、约束和方法目标讲透。"
      - heading: "核心机制"
        purpose: "解释方法的关键原理、系统支点或结构差异。"
      - heading: "按链路拆实现"
        purpose: "顺着原文链路讲清系统如何跑起来。"
      - heading: "关键代码与模块职责"
        purpose: "概括代码片段、接口、模块职责和依赖关系。"
      - heading: "工程边界与采用建议"
        purpose: "说明成本、限制、适用边界和采纳建议。"

github_repo_archetypes:
  single_repo:
    label: "单体系统仓库"
    objective: "按照单一系统来写，先交代项目定位和为什么值得关注，再拆整体架构、关键模块、工程取舍、部署方式和采用边界。"
    structural_reference:
      - "参考单体项目解析文章常见结构：问题背景 -> 整体方案 -> 关键模块 -> 工程总结 -> 部署/落地。"
      - "更接近“系统拆解”而不是“仓库导览”或“案例清单”。"
    outline_sections:
      - heading: "项目定位与核心问题"
        purpose: "先说清这个项目本质上是什么，以及它具体在解决什么问题。"
      - heading: "为什么值得关注"
        purpose: "回答它为什么值得在同类方案里优先看，以及它的核心突破点和代价。"
      - heading: "整体架构与技术栈"
        purpose: "按前端、服务、数据、集成、部署等层次整理系统结构和技术栈。"
      - heading: "关键模块与执行链路"
        purpose: "挑 2 到 4 条最关键的模块协作链路展开，结合真实代码解释职责和依赖关系。"
      - heading: "工程取舍与技术总结"
        purpose: "概括这些实现体现了什么技术范式、工程抽象和维护取舍。"
      - heading: "部署方式与接入建议"
        purpose: "整理安装、运行、自托管或接入路径，说明落地门槛。"
      - heading: "适用边界与采用建议"
        purpose: "明确哪些团队适合采用、哪些场景不建议直接照搬。"
      - heading: "GitHub 项目链接"
        purpose: "在结尾单独附上仓库链接。"
    must_cover:
      - "项目定位"
      - "为什么值得关注"
      - "整体架构与技术栈"
      - "关键模块与执行链路"
      - "工程取舍与技术总结"
      - "部署方式与接入建议"
      - "适用边界与采用建议"
      - "GitHub 项目链接"
    writer_rules:
      - "把它当成一个边界清晰的系统来写，不要退化成 README 转述。"
      - "实现细节要服务于架构理解，每条链路都要补上技术总结。"
      - "适合重代码拆解，但不要平均铺开全部文件。"

  collection_repo:
    label: "案例集合仓库"
    objective: "先写清这个仓库作为样本库/地图的价值，再做分类梳理，最后只挑一个代表案例做适度实现拆解。"
    structural_reference:
      - "参考案例集合类文章常见结构：仓库价值 -> 内容地图/分类 -> 为什么值得看 -> 代表案例 -> 如何用它学习/选型。"
      - "重点是仓库的样本价值和学习路径，而不是把多个示例写成一个系统。"
    outline_sections:
      - heading: "仓库定位与使用价值"
        purpose: "先说清这个仓库更像样本库、案例集还是学习地图，以及谁最适合看。"
      - heading: "内容地图与范式分类"
        purpose: "把仓库里覆盖的应用类型、技术范式或目录结构整理成可读地图。"
      - heading: "为什么值得持续关注"
        purpose: "回答它相对零散教程或单个 demo 的独特价值，以及为什么值得收藏或持续跟踪。"
      - heading: "代表案例拆解"
        purpose: "只挑一个最具代表性的子项目做适度技术拆解，说明核心链路和实现思路。"
      - heading: "如何使用这个仓库"
        purpose: "给出学习路径、选型路径或二次开发的入口建议，而不是泛泛介绍。"
      - heading: "适用边界与采用建议"
        purpose: "明确这类仓库更适合作为学习样本、灵感库还是直接落地基础。"
      - heading: "GitHub 项目链接"
        purpose: "在结尾单独附上仓库链接。"
    must_cover:
      - "仓库定位与使用价值"
      - "内容地图与范式分类"
      - "为什么值得持续关注"
      - "代表案例拆解"
      - "如何使用这个仓库"
      - "适用边界与采用建议"
      - "GitHub 项目链接"
    writer_rules:
      - "不要把多个子项目写成同一套系统。"
      - "实现和部署只允许围绕一个代表案例展开。"
      - "代码拆解应该适度，重点是分类价值和范式地图。"

  tooling_repo:
    label: "工具/模板仓库"
    objective: "先说清它解决什么痛点、适合什么场景，再梳理技术栈、关键能力、上手方式和接入边界。"
    structural_reference:
      - "参考工具/模板类文章常见结构：软件介绍 -> 适用场景 -> 技术栈与特点 -> 上手/命令流 -> 部署或接入 -> 适用边界。"
      - "重点是上手路径和工程接入价值，而不是硬拆一整套底层系统。"
    outline_sections:
      - heading: "工具定位与核心痛点"
        purpose: "先说明它是什么工具/模板，以及它优先解决什么痛点。"
      - heading: "使用场景与上手门槛"
        purpose: "让读者快速判断自己是否需要它，以及试用门槛有多高。"
      - heading: "技术栈与关键能力"
        purpose: "整理语言、框架、依赖和关键能力，不只列名词，还要说明用途。"
      - heading: "关键命令流或扩展方式"
        purpose: "重点解释命令流、目录结构、扩展点或二次开发入口。"
      - heading: "部署或接入方式"
        purpose: "整理安装、启动、接入、托管或替换默认配置的路径。"
      - heading: "适用边界与采用建议"
        purpose: "说明哪些团队适合直接使用，哪些情况更适合只借结构或思路。"
      - heading: "GitHub 项目链接"
        purpose: "在结尾单独附上仓库链接。"
    must_cover:
      - "工具定位与核心痛点"
      - "使用场景与上手门槛"
      - "技术栈与关键能力"
      - "关键命令流或扩展方式"
      - "部署或接入方式"
      - "适用边界与采用建议"
      - "GitHub 项目链接"
    writer_rules:
      - "优先解释使用路径、接入方式和关键能力，不要强行写成底层系统大拆解。"
      - "代码块可以少于单体系统仓库，但命令块、配置块和扩展点要说清。"
      - "如果是 starter/template，要明确哪些部分值得复用、哪些部分需要改造。"

content_types:
  tool_review:
    label: "工具 / 产品解读"
    objective: "把产品是什么、能做什么、为什么值得关注讲清楚。"
    opening_rules:
      - "开头先用一句话定义产品，再立刻点出它解决的是哪一类问题。"
      - "第二句优先说明为什么现在值得关注，而不是泛泛铺背景。"
    organization_rules:
      - "正文按 产品定义 → 核心能力 → 差异化机制 → 场景 → 边界 的顺序展开。"
      - "每个能力点都要落到实际工作流或决策场景，不要只列功能名。"
    evidence_rules:
      - "优先引用能力、机制、成本、速度、权限、部署方式这类产品证据。"
      - "如果原文有竞品对照或替代关系，要明确写出差异，不要只写“更强”。"
    ending_rules:
      - "结尾用“适合谁用 / 不适合谁用 / 该如何试用”来收束。"
      - "建议尽量落到采用门槛、接入顺序和试点路径。"
    quality_focus:
      - "产品定义是否足够清楚"
      - "差异化是否建立在机制而不是宣传语上"
      - "场景是否具体到可执行"
    rewrite_focus:
      - "删掉空泛能力罗列，补充实际使用方式"
      - "删掉夸张价值判断，补充采用边界"
    sections:
      - heading: "这是什么"
        purpose: "用一句话定义产品，再解释它解决的问题。"
      - heading: "核心能力拆解"
        purpose: "拆 3 到 5 个关键能力，说明每个能力的实际价值。"
      - heading: "机制与差异化"
        purpose: "解释它和常见 AI 助手或同类工具的区别，尽量写清产品机制。"
      - heading: "实战场景"
        purpose: "给出 2 到 3 个贴近工作流的使用场景。"
      - heading: "局限与建议"
        purpose: "说明现阶段限制、适用边界和采用建议。"
    emphasis:
      - "必须解释它和同类方案差在哪"
      - "优先写产品机制，不要只写功能列表"
      - "尽量给出工作流级别的使用方法"

  tutorial:
    label: "教程 / 工作流指南"
    objective: "把方法讲清楚，让读者知道怎么上手和怎么避坑。"
    opening_rules:
      - "开头直接说明这套方法能完成什么结果，最好写出适用对象和前提。"
      - "不要先讲行业背景，先告诉读者做完之后能得到什么。"
    organization_rules:
      - "正文优先按准备条件 → 操作步骤 → 验证结果 → 常见问题来组织。"
      - "步骤之间要有承接语，明确上一步产出如何进入下一步。"
    evidence_rules:
      - "优先引用命令、配置、输入输出、异常现象、校验方式这类可执行证据。"
      - "如果有代码块或命令块，解释它在步骤中的作用和预期结果。"
    ending_rules:
      - "结尾优先总结适用边界、常见坑和推荐的下一步尝试。"
      - "建议以“先做什么、再扩展什么”的顺序给出行动建议。"
    quality_focus:
      - "步骤是否可执行"
      - "前置条件和验证方式是否写清楚"
      - "避坑说明是否足够具体"
    rewrite_focus:
      - "补出缺失的准备条件、校验结果和失败处理"
      - "减少抽象概念，增加操作顺序和判断依据"
    sections:
      - heading: "先说结论"
        purpose: "直接告诉读者这套方法能解决什么问题。"
      - heading: "准备条件"
        purpose: "交代所需工具、前提和适用场景。"
      - heading: "分步实战"
        purpose: "按步骤讲清流程、操作和关键判断点。"
      - heading: "常见问题"
        purpose: "补充最容易踩坑的地方和解决建议。"
      - heading: "总结"
        purpose: "总结方法的边界、收益和下一步。"
    emphasis:
      - "每一步都要说明为什么这样做"
      - "必须让读者看完后可以照着执行"
      - "避免只给概念不给流程"

  technical_walkthrough:
    label: "技术实现拆解"
    objective: "按原文结构把系统设计、实现链路、代码职责和工程取舍讲清楚，让读者看完知道它到底是怎么搭出来的。"
    opening_rules:
      - "开头先讲系统要解决的核心问题、约束条件和为什么现有方案不够用。"
      - "不要把技术拆解写成产品介绍，第一屏就要把问题背景和工程目标讲透。"
    organization_rules:
      - "正文优先沿用原文章节顺序，先总览结构，再按链路拆实现，再讲代码和取舍。"
      - "如果原文已经有阶段、模块或流程，不要改写成另一套整齐但失真的模板。"
    evidence_rules:
      - "优先引用组件角色、状态流转、数据边界、接口职责、代码片段、性能指标。"
      - "每段都要回答“这一层做什么、依赖谁、代价是什么”，而不是只写结果。"
    ending_rules:
      - "结尾优先收束到适用边界、工程代价、未解决问题和采用建议。"
      - "如果实现细节有信息缺口，要明确写出不确定点，不要脑补。"
    quality_focus:
      - "结构和实现链路是否保真"
      - "代码职责与工程取舍是否解释清楚"
      - "是否避免了产品评测腔和教程腔"
    rewrite_focus:
      - "补足链路解释和组件分工"
      - "减少概括性大话，增加实现层细节"
    sections:
      - heading: "先讲系统要解决什么问题"
        purpose: "用一段话讲清楚目标问题、约束和为什么需要这套实现。"
      - heading: "系统结构与关键角色"
        purpose: "先交代组件、代理、数据流或模块分工，再进入细节。"
      - heading: "按链路拆解实现"
        purpose: "顺着原文步骤解释每一层是怎么串起来的，不要只给抽象结论。"
      - heading: "代码与工程细节"
        purpose: "概括关键代码片段、接口、状态流转和实现取舍。"
      - heading: "限制、风险与适用边界"
        purpose: "说明还没解决的问题、工程代价以及适合什么团队采用。"
    emphasis:
      - "优先沿用原文的章节顺序和实现链路"
      - "必须解释代码或伪代码在整条链路中的作用"
      - "不要把全文写成僵硬的价值/机制/场景模板文"

  news_analysis:
    label: "新闻 / 动态快评"
    objective: "快速讲清事件脉络、最值得关注的变化，以及这件事对读者意味着什么。"
    opening_rules:
      - "开头先概括事件，再直接指出为什么这件事值得关注。"
      - "不要把新闻快评写成技术拆解或教程，第一屏就要给出判断。"
    organization_rules:
      - "正文优先按 事件 → 关键变化 → 影响 → 建议 的顺序展开。"
      - "保持篇幅克制，避免为了完整而硬扩展成多层技术结构。"
    evidence_rules:
      - "优先引用发布时间、版本变化、价格调整、官方表态、能力边界变化等直接证据。"
      - "如果公开信息不足，就明确写出信息边界，不要补脑实现细节。"
    ending_rules:
      - "结尾优先给出短期判断和读者接下来要盯的信号。"
      - "建议聚焦观察点、应对动作和后续验证方向。"
    quality_focus:
      - "是否快速讲清事件与变化"
      - "是否写清楚对读者的实际影响"
      - "是否避免无根据脑补技术细节"
    rewrite_focus:
      - "删掉新闻复述堆砌，补充变化判断和行动建议"
      - "删掉结构性技术脑补，保留有依据的动态解读"
    sections:
      - heading: "事件脉络"
        purpose: "用最短篇幅交代事件、主角和变化点。"
      - heading: "变化焦点"
        purpose: "提炼 2 到 4 个最值得关注的变化，不要平铺素材。"
      - heading: "影响判断"
        purpose: "明确对开发者、企业或使用者的具体影响。"
      - heading: "后续观察"
        purpose: "给出可执行的观察点、应对建议或后续验证方向。"
    emphasis:
      - "不要把新闻写成技术实现拆解"
      - "不要为了显得深入而虚构系统内部细节"
      - "尽量用变化、影响和判断来组织正文"
      - "正文小标题不要直接写成 事件脉络 / 变化焦点 / 影响判断 / 后续观察 这类抽象标签，要改成能概括该节信息的具体标题"

  industry_analysis:
    label: "行业动态分析"
    objective: "把事件、影响和行动建议讲清楚，而不是复述新闻。"
    opening_rules:
      - "开头先概括事件脉络，再立刻指出为什么这件事对读者有实际影响。"
      - "不要只写新闻导语，要尽快进入判断和意义。"
    organization_rules:
      - "正文优先按 事件 → 关键变化 → 影响 → 建议 的顺序展开。"
      - "每一节都要围绕一个明确判断，而不是把素材堆在一起。"
    evidence_rules:
      - "优先引用发布时间、版本变化、组织动作、市场信号、成本变化、能力变化等证据。"
      - "背景材料只能服务于判断，不要把正文写成资讯串摘。"
    ending_rules:
      - "结尾优先给出短期判断、中期判断和读者现在可以做什么。"
      - "如果存在不确定性，要明确标注，而不是装作结论已经坐实。"
    quality_focus:
      - "是否真正形成判断而不是转述新闻"
      - "是否写清楚对读者的实际影响"
      - "不确定性是否表达克制"
    rewrite_focus:
      - "删掉新闻复述，补充影响分析和行动建议"
      - "删掉无依据推演，保留有证据支撑的判断"
    sections:
      - heading: "事件脉络"
        purpose: "快速概括事件和关键信息。"
      - heading: "变化焦点"
        purpose: "提炼 3 到 5 个高信息密度要点。"
      - heading: "影响判断"
        purpose: "分析具体影响，不要泛泛而谈。"
      - heading: "行动建议"
        purpose: "给出可执行的跟进建议。"
      - heading: "总结判断"
        purpose: "形成清晰结论，指出短期和中期意义。"
    emphasis:
      - "不要只搬运新闻"
      - "要写清楚对读者的实际影响"
      - "允许指出不确定性，但不能无依据推测"
      - "正文小标题不要直接写成 事件脉络 / 变化焦点 / 影响判断 / 行动建议 这类抽象标签，要改成能概括该节信息的具体标题"

quality_requirements:
  must_have:
    - "开头第一段直接定义主题，不要用空泛背景开场"
    - "至少 3 条有信息密度的关键点"
    - "至少 2 个具体应用场景、工作流或判断依据"
    - "必须写出局限、风险或适用边界"
    - "结尾必须给出可执行建议"
  must_avoid:
    - "随着 AI 的发展、在当今时代、众所周知 等套话"
    - "赋能、颠覆、降本增效 等无事实支撑的大话"
    - "同义反复和段落灌水"
    - "没有依据的猜测和脑补"
    - "营销腔、标题党、夸张表达"
  best_practices:
    - "每个小节先给结论，再给解释"
    - "优先使用短句和明确判断"
    - "尽量把抽象描述改成具体机制或例子"
    - "如果信息不足，就明确写出不确定点"

writing_style:
  tone: "专业、克制、信息密度高"
  prefer:
    - "用一句话先下判断"
    - "多用具体名词和事实，少用抽象修饰"
    - "多写为什么，少写正确的废话"
    - "优先解释机制、流程和边界"
  paragraph_structure:
    - "每段 2 到 4 句"
    - "每个小节围绕一个核心意思展开"
    - "列表优先用于并列信息"

global_constraints:
  - "只能基于已提供的事实包写作，事实包没有的信息不要编造"
  - "如果某个判断属于推测，要明确写成推测"
  - "输出必须是简体中文 Markdown"
  - "不要添加“参考资料”“延伸阅读”之类的额外章节"
